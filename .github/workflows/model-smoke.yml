name: Model Container Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  model-ready:
    name: Verify trained model container
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build the pinned model image
        run: docker build --progress=plain --tag cerebravue-model-smoke:${{ github.sha }} .

      - name: Start the application
        run: |
          set -euo pipefail
          fixture_dir="$RUNNER_TEMP/cerebravue-smoke"
          mkdir -p "$fixture_dir"
          chmod 777 "$fixture_dir"
          docker run --detach --rm --name cerebravue-model-smoke --publish 5000:5000 \
            --volume "$fixture_dir:/smoke" \
            cerebravue-model-smoke:${{ github.sha }}

      - name: Require the trained checkpoint to load
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --max-time 25 http://127.0.0.1:5000/readyz > ready.json; then
              cat ready.json
              python -c "import json; payload = json.load(open('ready.json')); assert payload['slice_model_ready'] is True, payload"
              exit 0
            fi
            sleep 5
          done
          echo "The trained model did not become ready."
          exit 1

      - name: Exercise one segmentation request
        run: |
          set -euo pipefail
          docker exec -i cerebravue-model-smoke python - <<'PY'
          from PIL import Image

          width = height = 320
          pixels = bytearray()
          for y in range(height):
              for x in range(width):
                  horizontal = (x - width / 2) / (width * 0.39)
                  vertical = (y - height / 2) / (height * 0.44)
                  radius = horizontal * horizontal + vertical * vertical
                  value = 8 if radius > 1 else int(72 + (1 - radius) * 128)
                  pixels.extend((value, value, value))
          Image.frombytes('RGB', (width, height), bytes(pixels)).save('/smoke/mri-smoke.png')
          PY
          if ! curl --fail-with-body --silent --show-error \
            --form "scan=@${RUNNER_TEMP}/cerebravue-smoke/mri-smoke.png;type=image/png" \
            http://127.0.0.1:5000/api/analyze > result.json; then
            cat result.json || true
            exit 1
          fi
          cat result.json
          python -c "import json; payload = json.load(open('result.json')); assert payload['status'] == 'ok', payload; assert payload.get('overlay_url'), payload"

      - name: Exercise a multi-view MRI image
        run: |
          set -euo pipefail
          docker exec -i cerebravue-model-smoke python - <<'PY'
          from PIL import Image

          width, height = 680, 320
          centers = (160, 520)
          pixels = bytearray()
          for y in range(height):
              for x in range(width):
                  value = 8
                  for center_x in centers:
                      horizontal = (x - center_x) / (width * 0.145)
                      vertical = (y - height / 2) / (height * 0.44)
                      radius = horizontal * horizontal + vertical * vertical
                      if radius <= 1:
                          value = max(value, int(72 + (1 - radius) * 128))
                  pixels.extend((value, value, value))
          Image.frombytes('RGB', (width, height), bytes(pixels)).save('/smoke/mri-multiview.png')
          PY
          if ! curl --fail-with-body --silent --show-error \
            --form "scan=@${RUNNER_TEMP}/cerebravue-smoke/mri-multiview.png;type=image/png" \
            http://127.0.0.1:5000/api/analyze > multiview-result.json; then
            cat multiview-result.json || true
            exit 1
          fi
          cat multiview-result.json
          python -c "import json; payload = json.load(open('multiview-result.json')); assert payload['status'] == 'ok', payload; assert payload.get('overlay_url'), payload; assert payload.get('source_preview_url'), payload"

      - name: Exercise the aligned 3D MRI volume path
        run: |
          set -euo pipefail
          docker exec -i cerebravue-model-smoke python - <<'PY'
          from pathlib import Path

          import nibabel as nib
          import numpy as np

          shape = (64, 64, 64)
          grid = np.indices(shape, dtype=np.float32)
          center = np.asarray(shape, dtype=np.float32)[:, None, None, None] / 2
          radius = np.sqrt(np.sum(((grid - center) / np.asarray((26, 29, 25), dtype=np.float32)[:, None, None, None]) ** 2, axis=0))
          volume = np.where(radius <= 1, 70 + (1 - radius) * 120, 0).astype(np.float32)
          affine = np.eye(4, dtype=np.float32)
          for modality in ('t1c', 't1', 't2', 'flair'):
              nib.save(nib.Nifti1Image(volume, affine), f'/smoke/{modality}.nii.gz')
          PY
          if ! curl --fail-with-body --silent --show-error \
            --form "t1c=@${RUNNER_TEMP}/cerebravue-smoke/t1c.nii.gz;type=application/gzip" \
            --form "t1=@${RUNNER_TEMP}/cerebravue-smoke/t1.nii.gz;type=application/gzip" \
            --form "t2=@${RUNNER_TEMP}/cerebravue-smoke/t2.nii.gz;type=application/gzip" \
            --form "flair=@${RUNNER_TEMP}/cerebravue-smoke/flair.nii.gz;type=application/gzip" \
            http://127.0.0.1:5000/api/analyze > volume-result.json; then
            cat volume-result.json || true
            docker logs cerebravue-model-smoke || true
            exit 1
          fi
          cat volume-result.json
          python -c "import json; payload = json.load(open('volume-result.json')); assert payload['status'] == 'ok', payload; assert payload['mode'] == '3d-mri', payload; assert payload['model_loaded'] is True, payload; assert payload.get('overlay_url'), payload; assert payload.get('source_preview_url'), payload; assert 'all-regions overview' in payload.get('details', {}).get('planes', []), payload"

      - name: Verify all credible 3D regions are retained
        run: |
          set -euo pipefail
          docker exec -i cerebravue-model-smoke python - <<'PY'
          from pathlib import Path

          import numpy as np

          from brain_mri_app.inference import BrainTumorInference

          service = BrainTumorInference(Path('/tmp/results'), Path('/app/models'))
          segmentation = np.zeros((48, 48, 48), dtype=np.uint8)
          segmentation[5:8, 5:8, 5:8] = 2
          segmentation[31:35, 28:32, 20:24] = 4
          segmentation[1, 1, 1] = 2

          cleaned = service._clean_volume_segmentation(segmentation)
          findings = service._volume_component_findings(cleaned)
          assert cleaned[1, 1, 1] == 0, cleaned[1, 1, 1]
          assert len(findings) == 2, findings
          print('3D component safeguards verified')
          PY

      - name: Show diagnostics when a check fails
        if: failure()
        run: docker logs cerebravue-model-smoke || true
