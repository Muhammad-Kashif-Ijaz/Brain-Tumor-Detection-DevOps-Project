name: Deploy NeuroScope MRI to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_NAME: neuroscope
  ENVIRONMENT: demo
  AZURE_LOCATION: eastus
  AUTO_SELECT_AZURE_LOCATION: "true"
  AZURE_LOCATION_CANDIDATES: "eastus eastus2 westus2 westus3 centralus southcentralus northeurope westeurope uksouth canadacentral southeastasia centralindia uaenorth"
  AKS_NODE_VM_SIZE: Standard_D2s_v7
  AKS_REQUIRED_VCPUS: "2"
  K8S_ROLLOUT_TIMEOUT: 20m
  IMAGE_NAME: neuroscope-mri

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Python files
        run: bash scripts/ci_check.sh

      - name: Provision infrastructure and deploy
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/azure_deploy.sh
