apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neuroscope-mri
  namespace: neuroscope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neuroscope-mri
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
